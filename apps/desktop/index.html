<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>echo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap"
    />
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        background: #FAFAF7;
        color: #1A1915;
        font-family: Georgia, serif;
      }
      #boot {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        color: #6B6862;
        font-size: 13px;
      }
      #boot .mark {
        width: 44px; height: 44px;
        background: #000; color: #fff;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; line-height: 1;
      }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div class="mark">e</div>
        <div>loading…</div>
      </div>
    </div>
    <script>
      // Surface any boot-time errors on-screen so a blank window can never be silent.
      (function () {
        function show(err) {
          var root = document.getElementById("root");
          if (!root) return;
          root.innerHTML =
            '<pre style="padding:24px;white-space:pre-wrap;font:12px/1.45 monospace;color:#9B3B3B;background:#FAFAF7;height:100%;overflow:auto;margin:0;">' +
            "boot error:\n\n" +
            (err && err.stack ? err.stack : String(err)) +
            "</pre>";
        }
        window.addEventListener("error", function (e) {
          show(e.error || e.message || "unknown error");
        });
        window.addEventListener("unhandledrejection", function (e) {
          show(e.reason || "unhandled promise rejection");
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
